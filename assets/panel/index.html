<!DOCTYPE html>
<html>
    <head>
        <title>$name - Control Panel</title>
        <link href="/static/style.css" rel="stylesheet">
        <style>
            @media (prefers-color-scheme: dark) {
                body {
                    background-color: black;
                    color: white;
                }
            }

            #info {
                p {
                    margin-left: 1.5em;
                }
            }
        </style>
    </head>
    <body>
        <h1>$name Control Panel</h1>
        <div id="info">
            <h3>Info:</h3>
            <p>Uptime - <span class="status" style="--status-color: $colouredUptime">$uptime%</span></p>
        </div>
    </body>
</html>
